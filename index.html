<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Police - WinForms App</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #09121f, #16233f);
      color: #e8eef9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 720px;
      background: rgba(12, 18, 34, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      padding: 36px;
    }
    h1 {
      margin-top: 0;
      color: #f4f9ff;
    }
    p {
      color: #c8d4ef;
      line-height: 1.7;
    }
    a {
      color: #70c8ff;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
    .note {
      margin-top: 24px;
      padding: 18px;
      background: rgba(112, 200, 255, 0.08);
      border: 1px solid rgba(112, 200, 255, 0.16);
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Police</h1>
    <p>Đây là repository chứa ứng dụng Windows Forms desktop bằng .NET 6.</p>
    <p>Vercel sẽ chỉ hiển thị trang web tĩnh, nên tôi đã thêm trang này để Vercel có thể triển khai thành công.</p>
    <div class="note">
      <p><strong>Ghi chú:</strong> Ứng dụng chính vẫn là desktop. Bạn có thể xem mã nguồn tại GitHub:</p>
      <p><a href="https://github.com/phamk4412-alt/police" target="_blank" rel="noopener noreferrer">https://github.com/phamk4412-alt/police</a></p>
    </div>
  </div>
</body>
</html>
