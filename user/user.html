<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Người dùng - Bản đồ TP.HCM</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #190d18;
      --panel: #2a1626;
      --accent: #fb7185;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: #fff1f2;
      min-height: 100vh;
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    h1 { font-size: 2.4rem; }

    .content {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid #563350;
      border-radius: 24px;
      padding: 24px;
    }

    #map {
      width: 100%;
      height: 620px;
      border-radius: 20px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .logout { background: #ef4444; color: white; }

    @media (max-width: 900px) {
      .content { grid-template-columns: 1fr; }
      #map { height: 480px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div>
        <p>Vai trò: Người dùng</p>
        <h1>Xem tin tức và báo cáo vụ án</h1>
      </div>
      <button class="btn logout" id="logoutButton">Đăng xuất</button>
    </div>

    <div class="content">
      <div class="panel">
        <h2>Tin tức mới</h2>
        <p>• Cảnh báo trộm cắp Quận 5</p>
        <p>• Điều chỉnh giao thông Quận 1</p>
      </div>

      <div class="panel">
        <h2>Bản đồ TP.HCM</h2>
        <div id="map"></div>
      </div>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem("policeRole") !== "user") {
      window.location.href = "../index.html";
    }

    mapboxgl.accessToken = 'pk.eyJ1IjoibWV4aXJpc2giLCJhIjoiY21vNWRpc2EyMXEweTJyb254MzFqbG1iNCJ9.GRmI8ieKWxlbCHAhq7__5Q';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [106.7009, 10.7769],
      zoom: 10
    });

    map.on('load', () => {
      // load geojson
      map.addSource('hcm', {
        type: 'geojson',
        data: '../hcm-boundary.geojson'
      });

      // fill vùng
      map.addLayer({
        id: 'hcm-fill',
        type: 'fill',
        source: 'hcm',
        paint: {
          'fill-color': '#60a5fa',
          'fill-opacity': 0.2
        }
      });

      // viền
      map.addLayer({
        id: 'hcm-line',
        type: 'line',
        source: 'hcm',
        paint: {
          'line-color': '#1e40af',
          'line-width': 3
        }
      });

      const hcmBounds = [
        [106.35, 10.35],
        [107.05, 11.15]
      ];

      map.fitBounds(hcmBounds, {
        padding: 30,
        duration: 0
      });
    });

    document.getElementById("logoutButton").addEventListener("click", () => {
      sessionStorage.removeItem("policeRole");
      window.location.href = "../index.html";
    });
  </script>
</body>
</html>
