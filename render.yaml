services:
  - type: web
    name: police-webserver
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: POLICE_DATABASE_PROVIDER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: police-postgres
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_DISPLAY_NAME
        sync: false

databases:
  - name: police-postgres
    plan: free