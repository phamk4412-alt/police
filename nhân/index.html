<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bản đồ TP. Hồ Chí Minh</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([10.78, 106.70], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Load file GeoJSON bạn vừa xuất từ geojson.io
    fetch('data/hcm-boundary.geojson')   // ← thay đường dẫn nếu khác
      .then(res => res.json())
      .then(geojson => {

        // Vẽ ranh giới TP.HCM
        L.geoJSON(geojson, {
          style: {
            color: "#1e40af",
            weight: 5,
            fillColor: "#bfdbfe",
            fillOpacity: 0.12
          }
        }).addTo(map);

        // Mask phần ngoài (làm tối)
        const world = [[90, -180], [90, 180], [-90, 180], [-90, -180], [90, -180]];

        L.polygon([world, geojson.features[0].geometry.coordinates[0]], {
          color: "#000000",
          fillColor: "#000000",
          fillOpacity: 0.78,     // chỉnh độ tối ở đây
          weight: 0,
          interactive: false
        }).addTo(map);

        // Zoom vừa khít ranh giới
        map.fitBounds(L.geoJSON(geojson).getBounds(), { padding: [40, 40] });

      })
      .catch(err => {
        console.error(err);
        alert("Không load được file GeoJSON!\nKiểm tra đường dẫn và tên file.");
      });
  </script>
</body>
</html>
