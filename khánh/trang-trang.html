<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khánh - Khu vực mở rộng</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #020617;
      --bg-bottom: #0b1122;
      --panel: rgba(8, 15, 30, 0.95);
      --line: rgba(148, 163, 184, 0.12);
      --text: #e2e8f0;
      --heading: #f8fafc;
      --muted: #94a3b8;
      --accent: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 28%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    .card {
      width: min(760px, 100%);
      padding: 40px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 32px 100px rgba(0, 0, 0, 0.3);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--heading);
      font-size: clamp(2.2rem, 4vw, 3rem);
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.8;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      color: var(--text);
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }
  </style>
</head>
<body>
  <section class="card">
    <p class="eyebrow">Khu vực mở rộng</p>
    <h1>Trang trắng mới</h1>
    <p>Đây là trang phụ của thư mục Khánh. Giao diện đã được đồng bộ với hệ thống để bạn có thể tiếp tục thêm báo cáo, biểu mẫu hoặc module mới mà không bị lệch phong cách.</p>
    <div class="actions">
      <a href="./index.html">Quay lại trang Khánh</a>
      <a href="../index.html">Về trang chủ</a>
    </div>
  </section>
</body>
</html>
